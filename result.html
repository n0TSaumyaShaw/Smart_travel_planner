<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Travel Plan</title>
    <link rel="stylesheet" href="result.css">
</head>
<body>

<div class="card">
    <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" class="icon">

    <h1>Your Travel Plan ✨</h1>

    <div id="resultBox" class="result-card"></div>

    <button onclick="goBack()">← Plan Again</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("result"));

let fallbackMessage = "";
let insightMessage = "";

// ⚠️ fallback message
if (data.fallback) {
    fallbackMessage = `
        <div class="fallback">
            ⚠️ Preference not available — showing best plan within your budget
        </div>
    `;
}

// 💡 insight message
if (data.fallback && data.extraNeeded > 0) {
    insightMessage = `
        <div class="insight">
            💡 You needed ₹${data.extraNeeded} more for your preferred plan
        </div>
    `;
}

document.getElementById("resultBox").innerHTML = `
    ${fallbackMessage}
    ${insightMessage}

    <div class="row">👤 <span>${data.name}</span></div>
    <div class="row">📍 <span>${data.destination}</span></div>
    <div class="row">🚍 <span>${data.transport}</span></div>
    <div class="row">🏨 <span>${data.hotel}</span></div>
    <div class="row highlight">💰 Rs ${data.cost}</div>
`;

function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
